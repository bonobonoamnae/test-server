<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PDF 변환하기 샤갈! </title>
        <link rel="icon" href="../Faviconai.png" type="image/png">
        <link rel="stylesheet" type="text/css" href="titlestyle.css">
        <script src="script.js" defer ></script>
    </head>

    <body>
      <div class="container" id="menuWrap">
        <h1 class="main" id="toggleTitle">말차 서버</h1>
        <div class="option-boxes" id="optionBoxes">
          <div class="option" id="option1">PDF 변환</div>
          <div class="option" id="option2">바질의 등장</div>
          <div class="option" id="option3">문의</div>
        </div>
      </div>

      <script> 
        option1.addEventListener("click", () => {manuallyToggled = !manuallyToggled;
        window.location.href = "../title 1/title1.html"
        });

        option2.addEventListener("click", () => {manuallyToggled = !manuallyToggled;
        window.location.href = "../title 2/title2.html"
        });

        option3.addEventListener("click", () => {manuallyToggled = !manuallyToggled;
        window.location.href = "../title 3/title3.html"
        });
          
      </script>
        <div class="wrap">
    <div class="card">
      <h1>PPTX → PDF 변환</h1>
      <div class="sub">여러 개의 PPTX 파일을 한 번에 변환하고 ZIP으로 다운로드</div>

      <div class="dropzone" id="dropzone">
        <div class="machine">⚙️</div>
        <div class="drop-title">파일을 넣어주세요 샤갈</div>
        <div class="drop-desc">PPTX 파일 여러개를 끌어놓거나 선택하기</div>

        <label class="file-btn" for="fileInput">파일 선택하기</label>
        <input class="hidden" type="file" id="fileInput" accept=".pptx" multiple />

        <div class="file-list" id="fileList">
          선택된 파일이 없음
        </div>
      </div>

      <div class="actions">
        <button class="convert-btn" id="convertBtn">변환 시작</button>
      </div>

      <div class="status" id="status">파일을 선택하세요</div>
      <div class="download-area" id="downloadArea"></div>
      <div class="tips">파일이 여러개일때 변환 결과는 ZIP 파일로 제공됩니다</div>
    </div>
  </div>

  <script src="convert.js"></script>



      <div style="height: 120vh;"></div>

    </body>
